REPLACE YOUR ENTIRE <style> WITH THIS

<style>
:root{
  --bg:#05070b;

  --white:#fff;

  --glass:rgba(255,255,255,.05);
  --glass2:rgba(255,255,255,.08);

  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.16);

  --text:rgba(255,255,255,.88);
  --muted:rgba(255,255,255,.45);
  --muted2:rgba(255,255,255,.28);

  --radius:30px;

  --shadow:
    0 10px 40px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.05);
}

/* =========================
RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:'Inter',sans-serif;

  background:#05070b;
  color:var(--white);

  overflow-x:hidden;

  -webkit-font-smoothing:antialiased;
}

/* =========================
APPLE BACKGROUND
========================= */

.gradient-bg{
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at top left,
      rgba(180,120,255,.18),
      transparent 30%
    ),

    radial-gradient(circle at bottom left,
      rgba(255,180,120,.10),
      transparent 30%
    ),

    radial-gradient(circle at right,
      rgba(80,120,255,.12),
      transparent 35%
    );

  filter:blur(40px);

  z-index:-2;
}

.apple-noise{
  position:fixed;
  inset:0;

  background-image:
  radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);

  background-size:3px 3px;

  opacity:.03;

  pointer-events:none;

  z-index:-1;
}

/* =========================
NAVBAR
========================= */

nav{
  position:fixed;

  top:18px;
  left:50%;

  transform:translateX(-50%);

  width:calc(100% - 40px);
  max-width:1150px;

  height:74px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 24px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  border-radius:999px;

  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);

  box-shadow:
    0 10px 40px rgba(0,0,0,.30),
    inset 0 1px 0 rgba(255,255,255,.06);

  z-index:999;
}

.logo img{
  height:34px;
}

.nav-tabs{
  display:flex;
  gap:6px;
}

.nav-tab{
  border:none;
  outline:none;

  background:transparent;

  color:var(--muted);

  padding:11px 18px;

  border-radius:999px;

  font-size:.8rem;
  font-weight:600;

  transition:.25s;
}

.nav-tab:hover{
  background:rgba(255,255,255,.08);
  color:white;
}

.nav-tab.active{
  background:rgba(255,255,255,.10);

  border:1px solid rgba(255,255,255,.08);

  color:white;
}

/* =========================
HERO
========================= */

.hero{
  min-height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  position:relative;

  padding:120px 20px 60px;
}

.hero::before{
  content:'';

  position:absolute;

  width:600px;
  height:600px;

  border-radius:50%;

  background:
    radial-gradient(circle,
      rgba(255,255,255,.14) 0%,
      rgba(180,120,255,.10) 35%,
      transparent 70%
    );

  filter:blur(80px);

  z-index:-2;
}

.hero::after{
  content:'';

  position:absolute;

  width:420px;
  height:420px;

  border-radius:50%;

  border:2px solid rgba(255,255,255,.14);

  box-shadow:
    0 0 120px rgba(255,255,255,.16),
    0 0 220px rgba(180,120,255,.10);

  z-index:-1;
}

.hero-badge{
  display:flex;
  align-items:center;
  gap:8px;

  padding:10px 18px;

  border-radius:999px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);

  margin-bottom:28px;

  color:rgba(255,255,255,.7);

  font-size:.7rem;

  letter-spacing:2px;

  text-transform:uppercase;
}

.badge-dot{
  width:6px;
  height:6px;

  border-radius:50%;

  background:#fff;

  box-shadow:0 0 12px white;
}

.hero-title{
  font-size:clamp(4rem,10vw,8rem);

  line-height:.92;

  font-weight:900;

  letter-spacing:-5px;

  margin-bottom:22px;
}

.hero-title .dim{
  color:rgba(255,255,255,.28);
}

.hero-sub{
  max-width:520px;

  color:rgba(255,255,255,.60);

  font-size:1rem;

  line-height:1.8;
}

.hero-btns{
  display:flex;
  gap:14px;

  margin-top:36px;
}

/* =========================
BUTTONS
========================= */

.btn{
  border:none;

  padding:15px 28px;

  border-radius:999px;

  font-size:.85rem;
  font-weight:700;

  transition:.3s;

  cursor:pointer;
}

.btn-white{
  background:white;
  color:black;

  box-shadow:
    0 10px 30px rgba(255,255,255,.15);
}

.btn-white:hover{
  transform:translateY(-2px) scale(1.02);
}

.btn-glass{
  background:rgba(255,255,255,.05);

  color:white;

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
}

.btn-glass:hover{
  background:rgba(255,255,255,.09);

  border-color:rgba(255,255,255,.16);

  transform:translateY(-2px);
}

/* =========================
SECTIONS
========================= */

.section{
  max-width:1200px;

  margin:auto;

  padding:90px 24px;
}

.section-label{
  color:rgba(255,255,255,.35);

  letter-spacing:3px;

  text-transform:uppercase;

  font-size:.7rem;

  margin-bottom:16px;
}

.section-title{
  font-size:clamp(2.5rem,6vw,5rem);

  line-height:1;

  letter-spacing:-3px;

  font-weight:900;

  margin-bottom:20px;
}

.section-title .dim{
  color:rgba(255,255,255,.28);
}

.section-desc{
  max-width:580px;

  color:rgba(255,255,255,.55);

  line-height:1.8;

  margin-bottom:46px;
}

/* =========================
APPLE CARDS
========================= */

.feature-grid,
.credits-grid,
.updates-grid,
.sounds-grid{
  display:grid;

  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

  gap:18px;
}

.feature-card,
.credit-card,
.update-card,
.sound-card{
  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  border-radius:32px;

  padding:28px;

  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);

  box-shadow:var(--shadow);

  transition:.35s;
}

.feature-card:hover,
.credit-card:hover,
.update-card:hover,
.sound-card:hover{
  transform:
    translateY(-8px)
    scale(1.01);

  background:rgba(255,255,255,.08);

  border-color:rgba(255,255,255,.16);
}

.feature-icon{
  width:56px;
  height:56px;

  border-radius:18px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  display:flex;
  align-items:center;
  justify-content:center;

  margin-bottom:18px;
}

.feature-name{
  font-size:1rem;
  font-weight:700;

  margin-bottom:8px;
}

.feature-desc{
  color:rgba(255,255,255,.52);

  line-height:1.7;

  font-size:.85rem;
}

/* =========================
LOADER
========================= */

.loader-box{
  max-width:720px;
  width:100%;

  display:flex;
  align-items:center;

  overflow:hidden;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  border-radius:24px;

  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
}

.loader-code{
  flex:1;

  padding:18px 24px;

  color:rgba(255,255,255,.7);

  font-family:'JetBrains Mono',monospace;

  font-size:.8rem;
}

.loader-copy{
  border:none;

  background:white;

  color:black;

  padding:18px 22px;

  font-weight:700;
}

/* =========================
INPUTS
========================= */

.modal-field,
.sounds-search{
  width:100%;

  border:none;
  outline:none;

  padding:15px 18px;

  border-radius:18px;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(255,255,255,.08);

  color:white;

  backdrop-filter:blur(30px) saturate(180%);
  -webkit-backdrop-filter:blur(30px) saturate(180%);
}

.modal-field:focus,
.sounds-search:focus{
  border-color:rgba(255,255,255,.16);
}

/* =========================
MODALS
========================= */

.modal-box,
.upload-modal-box{
  width:100%;
  max-width:500px;

  padding:34px;

  background:rgba(15,15,18,.72);

  border:1px solid rgba(255,255,255,.08);

  border-radius:36px;

  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);

  box-shadow:
    0 30px 90px rgba(0,0,0,.5);
}

.modal-title{
  font-size:1.4rem;
  font-weight:800;

  margin-bottom:8px;
}

.modal-sub{
  color:rgba(255,255,255,.5);

  margin-bottom:28px;
}

/* =========================
FOOTER
========================= */

footer{
  border-top:1px solid rgba(255,255,255,.06);

  padding:34px 24px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;

  gap:14px;

  color:rgba(255,255,255,.38);
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  nav{
    height:auto;

    border-radius:28px;

    padding:14px;

    flex-direction:column;

    gap:12px;
  }

  .nav-tabs{
    flex-wrap:wrap;
    justify-content:center;
  }

  .hero-title{
    letter-spacing:-2px;
  }

  .hero::after{
    width:300px;
    height:300px;
  }

  .hero::before{
    width:420px;
    height:420px;
  }

  .feature-card,
  .credit-card,
  .update-card,
  .sound-card{
    border-radius:24px;
  }

}
</style>
